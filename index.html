<style>

  html, body { height: 100%; }
  body {
    background: #000;

  }
  main {
    display: flex;

    align-items: center;
    gap: 2.25rem;
    padding: 2.5rem 1.5rem;

    background: #c8ff00;
    color: #000;
    font-family: inherit;

    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 0.95rem 2.6rem;
    border-radius: 999px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .contact:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(200, 255, 0, 0.35);
  }
  .contact:focus-visible {
    outline: 2px solid #c8ff00;
    outline-offset: 4px;
  }
  .email {
    color: #9aa0a6;
    font-size: 0.85rem;
    text-decoration: none;
    margin-top: -1rem;
  }
  .email:hover { color: #f4f4f5; }
  .credit {
    position: fixed;
    bottom: 1.1rem;
    left: 0;
    right: 0;
    font-size: 0.72rem;
    letter-spacing: 0.03em;
    color: #52565c;
    text-align: center;
  }
  .credit a { color: #6b7076; text-decoration: none; }
  .credit a:hover { color: #c8ff00; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    main { animation: none; }
    .contact { transition: none; }
